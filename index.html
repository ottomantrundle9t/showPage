<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>英语单词乐园</title>
  <meta name="description" content="适合小学三年级学生练习英语单词的小网页应用。" />
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg-top: #fff7d6;
      --bg-bottom: #e9f5ff;
      --panel: #ffffff;
      --orange: #ff914d;
      --orange-dark: #ff7a24;
      --blue: #4a90ff;
      --blue-dark: #2f74e7;
      --gray: #eef1f5;
      --gray-border: #d6dbe4;
      --text: #2d3748;
      --success: #25a55b;
      --error: #e35656;
      --spell: #ffd86b;
      --listen: #7fd1ae;
      --choice: #b19cff;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Comic Sans MS", "Trebuchet MS", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
      color: var(--text);
    }

    .app {
      width: min(920px, calc(100% - 24px));
      margin: 24px auto;
      padding: 24px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 18px 40px rgba(81, 121, 170, 0.18);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .title {
      margin: 0;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
    }

    .subtitle {
      margin: 6px 0 0;
      color: #617087;
      font-size: 0.98rem;
    }

    .scoreboard {
      padding: 12px 18px;
      border-radius: 18px;
      background: #f4f9ff;
      border: 2px solid #d6e7ff;
      font-weight: 700;
      font-size: 1.1rem;
    }

    .mode-switcher {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 18px;
    }

    .mode-btn,
    .action-btn,
    .choice-btn {
      border: 0;
      border-radius: 16px;
      cursor: pointer;
      font: inherit;
      transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
    }

    .mode-btn:hover,
    .action-btn:hover,
    .choice-btn:hover {
      transform: translateY(-2px);
    }

    .mode-btn {
      padding: 14px 12px;
      font-weight: 700;
      color: #233044;
      box-shadow: 0 8px 18px rgba(68, 91, 123, 0.12);
    }

    .mode-btn[data-mode="spell"] {
      background: var(--spell);
    }

    .mode-btn[data-mode="listen"] {
      background: var(--listen);
    }

    .mode-btn[data-mode="choice"] {
      background: var(--choice);
    }

    .mode-btn.active {
      outline: 4px solid rgba(45, 55, 72, 0.12);
      transform: translateY(-1px) scale(1.01);
    }

    .word-card {
      display: grid;
      place-items: center;
      min-height: 180px;
      margin-bottom: 18px;
      padding: 24px;
      border-radius: 28px;
      background: linear-gradient(135deg, var(--orange), var(--orange-dark));
      color: white;
      text-align: center;
      box-shadow: 0 18px 28px rgba(255, 145, 77, 0.28);
    }

    .word-label {
      margin: 0 0 12px;
      font-size: 1rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.9;
    }

    .word-display {
      margin: 0;
      font-size: clamp(2rem, 7vw, 4.5rem);
      line-height: 1.1;
      word-break: break-word;
    }

    .panel {
      padding: 18px;
      border-radius: 24px;
      background: #fffdf9;
      border: 2px solid #ffe9d7;
    }

    .helper-text {
      margin: 0 0 14px;
      color: #5d6b80;
      font-size: 1rem;
    }

    .answer-input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #d9e1ec;
      border-radius: 16px;
      font-size: 1.1rem;
      outline: none;
    }

    .answer-input:focus {
      border-color: #8ab7ff;
      box-shadow: 0 0 0 4px rgba(74, 144, 255, 0.16);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 16px;
    }

    .action-btn {
      padding: 13px 20px;
      background: var(--blue);
      color: white;
      font-weight: 700;
      box-shadow: 0 10px 20px rgba(74, 144, 255, 0.25);
    }

    .action-btn:hover {
      background: var(--blue-dark);
    }

    .choice-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .choice-btn {
      min-height: 58px;
      padding: 12px;
      background: var(--gray);
      color: #344053;
      border: 2px solid var(--gray-border);
      font-weight: 700;
    }

    .choice-btn.correct {
      background: #d9f7e5;
      border-color: #7fd1ae;
    }

    .choice-btn.wrong {
      background: #ffe0e0;
      border-color: #f09b9b;
    }

    .feedback {
      min-height: 32px;
      margin-top: 16px;
      font-size: 1.05rem;
      font-weight: 700;
    }

    .feedback.success {
      color: var(--success);
    }

    .feedback.error {
      color: var(--error);
    }

    .word-count {
      margin-top: 14px;
      color: #6f7c91;
      font-size: 0.95rem;
    }

    @media (max-width: 680px) {
      .app {
        padding: 18px;
      }

      .mode-switcher {
        grid-template-columns: 1fr;
      }

      .actions {
        flex-direction: column;
      }

      .action-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="topbar">
      <div>
        <h1 class="title">英语单词乐园</h1>
        <p class="subtitle">适合小学三年级学生的英语单词练习</p>
      </div>
      <div class="scoreboard">Score: <span id="score">0</span></div>
    </section>

    <section class="mode-switcher">
      <button class="mode-btn active" data-mode="spell" type="button">Spell</button>
      <button class="mode-btn" data-mode="listen" type="button">Listen</button>
      <button class="mode-btn" data-mode="choice" type="button">Choice</button>
    </section>

    <section class="word-card">
      <div>
        <p class="word-label">当前单词</p>
        <h2 class="word-display" id="wordDisplay">apple</h2>
      </div>
    </section>

    <section class="panel">
      <p class="helper-text" id="helperText">先看单词，再在下面输入正确拼写。</p>

      <div id="inputArea">
        <input
          id="answerInput"
          class="answer-input"
          type="text"
          placeholder="请在这里输入单词"
          autocomplete="off"
        />
      </div>

      <div class="choice-grid" id="choiceArea" hidden></div>

      <div class="actions">
        <button class="action-btn" id="playBtn" type="button">Play Sound</button>
        <button class="action-btn" id="checkBtn" type="button">Check</button>
        <button class="action-btn" id="nextBtn" type="button">Next</button>
      </div>

      <div class="feedback" id="feedback"></div>
      <div class="word-count" id="wordCount"></div>
    </section>
  </main>

  <script>
    const words = [
      "apple", "banana", "dog", "cat", "duck", "fish", "book", "pen", "pencil",
      "bag", "red", "blue", "green", "yellow", "milk", "bread", "cake", "egg",
      "father", "mother", "brother", "sister", "friend", "ball", "doll", "car",
      "robot", "school", "classroom", "library", "bed", "juice", "water",
      "window", "door", "rubber", "eraser", "open", "close", "blackboard",
      "stand up", "sit down", "listen", "read", "write", "in", "on", "under",
      "behind", "class", "miss", "he", "she", "you", "I"
    ];

    let score = 0;
    let currentMode = "spell";
    let currentIndex = 0;
    let choiceOptions = [];
    let answeredCurrent = false;

    const scoreEl = document.getElementById("score");
    const wordDisplay = document.getElementById("wordDisplay");
    const helperText = document.getElementById("helperText");
    const answerInput = document.getElementById("answerInput");
    const inputArea = document.getElementById("inputArea");
    const choiceArea = document.getElementById("choiceArea");
    const feedback = document.getElementById("feedback");
    const wordCount = document.getElementById("wordCount");
    const playBtn = document.getElementById("playBtn");
    const checkBtn = document.getElementById("checkBtn");
    const nextBtn = document.getElementById("nextBtn");
    const modeButtons = Array.from(document.querySelectorAll(".mode-btn"));

    shuffle(words);
    render();

    modeButtons.forEach((button) => {
      button.addEventListener("click", () => {
        currentMode = button.dataset.mode;
        modeButtons.forEach((item) => item.classList.toggle("active", item === button));
        answeredCurrent = false;
        answerInput.value = "";
        feedbackMessage("");
        render();
      });
    });

    playBtn.addEventListener("click", () => {
      speakWord(words[currentIndex]);
    });

    checkBtn.addEventListener("click", () => {
      if (currentMode === "choice") {
        feedbackMessage("请选择下面的一个正确答案。", "error");
        return;
      }

      const userAnswer = normalize(answerInput.value);
      const correctAnswer = normalize(words[currentIndex]);

      if (!userAnswer) {
        feedbackMessage("请先输入你的答案。", "error");
        return;
      }

      if (userAnswer === correctAnswer) {
        markCorrect();
      } else {
        feedbackMessage("再试一次。正确答案是：" + words[currentIndex], "error");
      }
    });

    nextBtn.addEventListener("click", () => {
      nextWord();
    });

    answerInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        checkBtn.click();
      }
    });

    function render() {
      const currentWord = words[currentIndex];
      const showRealWord = currentMode !== "listen";

      wordDisplay.textContent = showRealWord ? currentWord : "请认真听发音";
      helperText.textContent = getHelperText();
      answerInput.placeholder = currentMode === "listen"
        ? "听发音后输入单词"
        : "请在这里输入单词";

      inputArea.hidden = currentMode === "choice";
      choiceArea.hidden = currentMode !== "choice";
      checkBtn.hidden = currentMode === "choice";

      if (currentMode === "choice") {
        createChoiceOptions();
      } else {
        answerInput.value = "";
      }

      wordCount.textContent = "当前进度：" + (currentIndex + 1) + " / " + words.length;
    }

    function getHelperText() {
      if (currentMode === "spell") {
        return "请看上面的单词，然后输入正确拼写。";
      }

      if (currentMode === "listen") {
        return "点击播放发音，认真听，再输入你听到的单词。";
      }

      return "请从下面三个选项中选出正确单词。";
    }

    function createChoiceOptions() {
      const currentWord = words[currentIndex];
      const otherWords = words.filter((word) => word !== currentWord);
      shuffle(otherWords);
      choiceOptions = [currentWord, otherWords[0], otherWords[1]];
      shuffle(choiceOptions);

      choiceArea.innerHTML = "";
      choiceOptions.forEach((option) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "choice-btn";
        button.textContent = option;
        button.addEventListener("click", () => handleChoice(option, button));
        choiceArea.appendChild(button);
      });
    }

    function handleChoice(option, button) {
      if (answeredCurrent) {
        return;
      }

      const correctWord = words[currentIndex];
      const buttons = Array.from(choiceArea.querySelectorAll(".choice-btn"));

      if (option === correctWord) {
        button.classList.add("correct");
        markCorrect();
      } else {
        button.classList.add("wrong");
        buttons
          .find((item) => item.textContent === correctWord)
          .classList.add("correct");
        answeredCurrent = true;
        feedbackMessage("答错了，正确答案是：" + correctWord, "error");
      }
    }

    function markCorrect() {
      if (!answeredCurrent) {
        score += 1;
        scoreEl.textContent = score;
        answeredCurrent = true;
      }
      feedbackMessage("答对了，得 1 分。", "success");
    }

    function nextWord() {
      currentIndex += 1;
      if (currentIndex >= words.length) {
        shuffle(words);
        currentIndex = 0;
      }

      answeredCurrent = false;
      feedbackMessage("");
      render();
    }

    function feedbackMessage(message, type = "") {
      feedback.textContent = message;
      feedback.className = "feedback";
      if (type) {
        feedback.classList.add(type);
      }
    }

    function speakWord(text) {
      if (!("speechSynthesis" in window)) {
        feedbackMessage("当前浏览器暂不支持语音播放。", "error");
        return;
      }

      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "en-US";
      utterance.rate = 0.88;
      utterance.pitch = 1.02;
      window.speechSynthesis.speak(utterance);
    }

    function normalize(text) {
      return text.trim().toLowerCase().replace(/\s+/g, " ");
    }

    function shuffle(list) {
      for (let i = list.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [list[i], list[j]] = [list[j], list[i]];
      }
      return list;
    }
  </script>
</body>
</html>
