<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的静态网页</title>
  <meta
    name="description"
    content="一个可以直接部署到 GitHub Pages 的静态网页示例。"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <div class="hero__content">
      <p class="hero__eyebrow">GitHub Pages Demo</p>
      <h1>你好，我的网页上线了</h1>
      <p class="hero__text">
        这是一个可以直接放到 GitHub 上公开访问的静态网页模板。
      </p>
      <a class="btn" href="#about">看看内容</a>
    </div>
  </header>

  <main class="container">
    <section id="about" class="card">
      <h2>关于这个页面</h2>
      <p>
        你可以把这里改成个人介绍、作品集、项目展示、活动页面或者简单的产品介绍。
      </p>
    </section>

    <section class="grid">
      <article class="card">
        <h2>为什么适合 GitHub Pages</h2>
        <p>只要是 HTML、CSS、JavaScript 这类静态文件，就可以直接部署。</p>
      </article>

      <article class="card">
        <h2>接下来可以加什么</h2>
        <p>图片、导航栏、按钮、表单说明、项目卡片，或者你的联系方式。</p>
      </article>
    </section>
  </main>

  <footer class="footer">
    <p>© 2026 我的静态网页</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
